name: CI

# Fast checks on every push / PR: frontend typecheck + build, and the Rust
# unit tests. Does not produce installers (that's release.yml).

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Build frontend
        run: pnpm build

  rust:
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
          - platform: ubuntu-24.04
          - platform: ubuntu-24.04-arm
          - platform: ubuntu-26.04
          - platform: ubuntu-26.04-arm
          - platform: windows-latest
          # Windows arm64 hosted runners are still public preview as of
          # 2026-06-27, so keep this signal non-blocking in CI for now.
          - platform: windows-11-arm
            experimental: true
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file libxdo-dev libssl-dev \
            xdg-utils
      - name: Unit tests
        working-directory: ./src-tauri
        run: cargo test
      - name: Clippy
        working-directory: ./src-tauri
        run: cargo clippy --no-deps
