name: Release

# Builds and packages installers for macOS, Windows, and Linux, then attaches
# them to a draft GitHub Release. Triggered by pushing a version tag (e.g.
# `v0.1.0`) or run manually from the Actions tab.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    continue-on-error: ${{ matrix.experimental || false }}
    permissions:
      contents: write # needed to create the release and upload assets
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon + Intel in one universal .dmg / .app
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: ubuntu-24.04
            args: ""
            rust-targets: ""
          - platform: ubuntu-24.04-arm
            args: ""
            rust-targets: ""
          - platform: ubuntu-26.04
            args: ""
            rust-targets: ""
          - platform: ubuntu-26.04-arm
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""
          # Windows arm64 hosted runners are still public preview as of
          # 2026-06-27, so keep this release lane best-effort for now.
          - platform: windows-11-arm
            args: ""
            rust-targets: ""
            experimental: true

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl wget file libxdo-dev libssl-dev \
            xdg-utils

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — set these repo secrets to publish signed updates.
          # When unset, builds are simply unsigned (no auto-update artifacts).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          releaseName: "immichBEAM ${{ github.ref_type == 'tag' && github.ref_name || github.run_number }}"
          releaseBody: "Download the installer for your platform from the assets below."
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          args: ${{ matrix.args }}

      # For prerelease tags (v*-beta* or v*-rc*): upload latest-beta.json and
      # force-move the `beta` tag so the beta endpoint always resolves.
      - name: Publish beta feed + move beta tag
        if: contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc')
        run: |
          TAG="${{ github.ref_name }}"
          gh release download "$TAG" --repo nickdwhite/immichBEAM --pattern "latest.json" --dir /tmp/
          cp /tmp/latest.json /tmp/latest-beta.json
          gh release upload "$TAG" /tmp/latest-beta.json --repo nickdwhite/immichBEAM --clobber
          git tag -f beta "$GITHUB_SHA"
          git push origin beta --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
